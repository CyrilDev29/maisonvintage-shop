# config/services.yaml
parameters:
    app.contact_from: '%env(string:CONTACT_FROM)%'
    app.seller_email: '%env(string:CONTACT_TO)%'

    stripe.public_key: '%env(string:STRIPE_PUBLIC_KEY)%'

    bank.holder:   '%env(string:BANK_HOLDER)%'
    bank.bankname: '%env(string:BANK_BANKNAME)%'
    bank.iban:     '%env(string:BANK_IBAN)%'
    bank.bic:      '%env(string:BANK_BIC)%'

    # Durées de réservation (checkout)
    maisonvintage.ttl.bank_transfer_hours: 72   # virement : 72h
    maisonvintage.ttl.card_minutes: 30          # CB/PayPal : 30 min

    # --- Colissimo (devis) ---
    colissimo.api_base: '%env(string:COLISSIMO_API_BASE)%'
    colissimo.api_key:  '%env(string:COLISSIMO_API_KEY)%'
    shipping.colissimo_live: '%env(bool:SHIPPING_COLISSIMO_LIVE)%'

    # --- Mondial Relay (devis) ---
    mondialrelay.api_key:    '%env(string:MONDIALRELAY_API_KEY)%'
    mondialrelay.api_secret: '%env(string:MONDIALRELAY_API_SECRET)%'
    shipping.mondialrelay_live: '%env(bool:SHIPPING_MONDIALRELAY_LIVE)%'

    # --- Cocolis (devis) ---
    cocolis.api_key: '%env(string:COCOLIS_API_KEY)%'
    shipping.cocolis_live: '%env(bool:SHIPPING_COCOLIS_LIVE)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'

    App\Service\InvoiceService:
        arguments:
            $projectDir: '%kernel.project_dir%'

    App\EntityListener\ArticleSlugListener:
        tags:
            - { name: doctrine.orm.entity_listener, entity: App\Entity\Article, event: prePersist }
            - { name: doctrine.orm.entity_listener, entity: App\Entity\Article, event: preUpdate }

    App\Security\UserChecker: ~

    App\Service\StripePaymentService:
        arguments:
            $publicKey:   '%env(string:STRIPE_PUBLIC_KEY)%'
            $secretKey:   '%env(string:STRIPE_SECRET_KEY)%'
            $successUrl:  '%env(string:PAYMENT_SUCCESS_URL)%'
            $cancelUrl:   '%env(string:PAYMENT_CANCEL_URL)%'
            $currency:    '%env(string:PAYMENT_CURRENCY)%'
            $enablePaypal: true
            $webhookSecret: '%env(string:STRIPE_WEBHOOK_SECRET)%'

    App\Service\OrderStatusNotifier: ~

    # -------- Colissimo API client + service --------
    colissimo.client:
        class: Symfony\Contracts\HttpClient\HttpClientInterface
        factory: ['@http_client', 'withOptions']
        arguments:
            - {
                base_uri: '%colissimo.api_base%',
                headers: { 'X-Api-Key': '%colissimo.api_key%' }
            }

    App\Service\Shipping\ColissimoApi:
        arguments:
            $http:    '@colissimo.client'
            $apiBase: '%colissimo.api_base%'
            $apiKey:  '%colissimo.api_key%'
            $enabled: '%shipping.colissimo_live%'

    # -------- Mondial Relay API client + service --------
    mondialrelay.client:
        class: Symfony\Contracts\HttpClient\HttpClientInterface
        factory: ['@http_client', 'withOptions']
        arguments:
            - {
                base_uri: 'https://api.mondialrelay.com',
                timeout: 6.0
            }

    App\Service\Shipping\MondialRelayApi:
        arguments:
            $http:      '@mondialrelay.client'
            $apiKey:    '%mondialrelay.api_key%'
            $apiSecret: '%mondialrelay.api_secret%'
            $enabled:   '%shipping.mondialrelay_live%'

    # -------- Cocolis API client + service --------
    cocolis.client:
        class: Symfony\Contracts\HttpClient\HttpClientInterface
        factory: ['@http_client', 'withOptions']
        arguments:
            - {
                base_uri: 'https://api.cocolis.fr',
                timeout: 6.0
            }

    App\Service\Shipping\CocolisApi:
        arguments:
            $http:    '@cocolis.client'
            $apiKey:  '%cocolis.api_key%'
            $enabled: '%shipping.cocolis_live%'
